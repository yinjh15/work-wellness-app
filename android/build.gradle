 // 顶层构建文件
 buildscript {
     repositories {
         google()
         mavenCentral()
     }
     dependencies {
         classpath 'com.android.tools.build:gradle:8.2.0'
     }
 }

 allprojects {
     repositories {
         google()
         mavenCentral()
     }
 }

 task clean(type: Delete) {
     delete rootProject.buildDir
 }
