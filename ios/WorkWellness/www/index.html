 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
   <meta name="theme-color" content="#1A0A2E">
   <meta name="apple-mobile-web-app-capable" content="yes">
   <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
   <meta name="format-detection" content="telephone=no">
   <title>工作养生</title>
   <link rel="stylesheet" href="css/style.css">
   <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
 </head>
 <body>
   <canvas id="particleCanvas"></canvas>
 
   <!-- Settings Overlay -->
   <div id="settingsOverlay" class="settings-overlay"></div>
 
   <!-- Main Container -->
   <div class="container">
 
     <!-- Header -->
     <header>
       <h1>工作养生</h1>
       <button id="settingsBtn" class="header-btn" aria-label="设置">⚙</button>
     </header>
 
     <!-- Toggle Section -->
     <div class="toggle-section">
       <button id="masterToggle" class="master-toggle">
         <span class="toggle-icon">▶</span>
       </button>
       <p id="statusText" class="status-text">已暂停</p>
       <p id="workDuration" class="work-duration">今日工作 0h 0m</p>
     </div>
 
     <!-- Timer Cards -->
     <div class="timers">
       <div id="activityCard" class="timer-card">
         <div class="timer-icon">🚶</div>
         <div id="activityCountdown" class="timer-countdown">--:--</div>
         <div class="timer-label">活动提醒</div>
         <div id="activityIntervalLabel" class="timer-interval">每 40 分钟</div>
       </div>
       <div id="waterCard" class="timer-card">
         <div class="timer-icon">💧</div>
         <div id="waterCountdown" class="timer-countdown">--:--</div>
         <div class="timer-label">喝水提醒</div>
         <div id="waterIntervalLabel" class="timer-interval">每 60 分钟</div>
       </div>
     </div>
 
     <!-- Daily Stats -->
     <div class="stats-bar">
       <div class="stat-item">
         <span class="stat-icon">🚶</span>
         <span class="stat-count" id="activityCount">0</span>
         <span class="stat-unit">次活动</span>
       </div>
       <div class="stat-divider"></div>
       <div class="stat-item">
         <span class="stat-icon">💧</span>
         <span class="stat-count" id="waterCount">0</span>
         <span class="stat-unit">次饮水</span>
       </div>
       <div class="stat-divider"></div>
       <div class="stat-item">
         <span class="stat-icon">⏱️</span>
         <span class="stat-count" id="totalMinutes">0</span>
         <span class="stat-unit">分钟</span>
       </div>
     </div>
   </div>
 
   <!-- Settings Panel -->
   <div id="settingsPanel" class="settings-panel">
     <div class="settings-handle"></div>
     <div class="settings-title">设置</div>
 
     <div class="setting-group">
       <div class="setting-label">
         <span>活动提醒间隔</span>
         <span class="value" id="activityIntervalValue">40 分钟</span>
       </div>
       <input type="range" id="activityIntervalSlider" min="20" max="120" step="5" value="40">
     </div>
 
     <div class="setting-group">
       <div class="setting-label">
         <span>喝水提醒间隔</span>
         <span class="value" id="waterIntervalValue">60 分钟</span>
       </div>
       <input type="range" id="waterIntervalSlider" min="30" max="180" step="5" value="60">
     </div>
 
     <button id="saveSettings" class="btn-primary">保存设置</button>
 
     <!-- 通知测试按钮（iOS 专用） -->
     <button id="testNotificationBtn" class="btn-secondary" style="margin-top:12px;">🔔 测试通知</button>
 
     <div class="about-section">
       <div class="about-row"><span>应用</span><span>工作养生</span></div>
       <div class="about-row"><span>版本</span><span>1.0.0</span></div>
       <div class="about-row"><span>平台</span><span>iOS 离线版</span></div>
       <div class="about-row"><span>功能</span><span>定时活动 + 饮水提醒</span></div>
     </div>
   </div>
 
   <script src="js/particles.js"></script>
   <script src="js/ios-bridge.js"></script>
   <script src="js/app.js"></script>
 </body>
 </html>
