 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
   <meta name="theme-color" content="#1A0A2E">
   <meta name="apple-mobile-web-app-capable" content="yes">
   <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
   <meta name="mobile-web-app-capable" content="yes">
   <meta name="format-detection" content="telephone=no">
   <title>工作养生</title>
   <link rel="manifest" href="manifest.json">
   <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
   <link rel="icon" href="icons/pwa-icon-192.png" type="image/png">
   <link rel="stylesheet" href="css/style.css">
 </head>
 <body>
   <canvas id="particleCanvas"></canvas>
   <div id="settingsOverlay" class="settings-overlay"></div>
   <div class="container">
     <header>
       <h1>工作养生</h1>
       <button id="settingsBtn" class="header-btn" aria-label="设置">&#9881;</button>
     </header>
     <div class="toggle-section">
       <button id="masterToggle" class="master-toggle">
         <span class="toggle-icon">&#9654;</span>
       </button>
       <p id="statusText" class="status-text">已暂停</p>
       <p id="workDuration" class="work-duration">今日工作 0h 0m</p>
     </div>
     <div class="timers">
       <div id="activityCard" class="timer-card">
         <div class="timer-icon">&#128694;</div>
         <div id="activityCountdown" class="timer-countdown">--:--</div>
         <div class="timer-label">活动提醒</div>
         <div id="activityIntervalLabel" class="timer-interval">每 40 分钟</div>
       </div>
       <div id="waterCard" class="timer-card">
         <div class="timer-icon">&#128168;</div>
         <div id="waterCountdown" class="timer-countdown">--:--</div>
         <div class="timer-label">喝水提醒</div>
         <div id="activityIntervalLabel" class="timer-interval">每 60 分钟</div>
       </div>
     </div>
     <div class="stats-bar">
       <div class="stat-item">
         <span class="stat-icon">&#128694;</span>
         <span class="stat-count" id="activityCount">0</span>
         <span class="stat-unit">次活动</span>
       </div>
       <div class="stat-divider"></div>
       <div class="stat-item">
         <span class="stat-icon">&#128168;</span>
         <span class="stat-count" id="waterCount">0</span>
         <span class="stat-unit">次饮水</span>
       </div>
     </div>
   </div>
   <div id="settingsPanel" class="settings-panel">
     <div class="settings-handle"></div>
     <div class="settings-title">设置</div>
     <div class="setting-group">
       <div class="setting-label">
         <span>活动提醒间隔</span>
         <span class="value" id="activityIntervalValue">40 分钟</span>
       </div>
       <input type="range" id="activityIntervalSlider" min="20" max="120" step="5" value="40">
     </div>
     <div class="setting-group">
       <div class="setting-label">
         <span>喝水提醒间隔</span>
         <span class="value" id="waterIntervalValue">60 分钟</span>
       </div>
       <input type="range" id="waterIntervalSlider" min="30" max="180" step="5" value="60">
     </div>
     <button id="saveSettings" class="btn-primary">保存设置</button>
     <div class="setting-group" style="margin-top:24px">
       <div class="setting-label">
         <span>远程配置 URL</span>
       </div>
       <input type="text" id="configUrlInput" class="setting-input" placeholder="输入配置JSON的URL" value="">
       <button id="syncConfig" class="btn-secondary">同步远程配置</button>
     </div>
     <div class="about-section">
       <div class="about-row"><span>应用</span><span>工作养生</span></div>
       <div class="about-row"><span>版本</span><span>1.0.0</span></div>
       <div class="about-row"><span>功能</span><span>定时活动 + 饮水提醒</span></div>
     </div>
   </div>
   <script src="js/particles.js"></script>
   <script src="js/service-worker-register.js"></script>
   <script src="js/app.js"></script>
 </body>
 </html>
